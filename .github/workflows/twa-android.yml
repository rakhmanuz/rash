# rash.uz TWA — GitHub’da Android loyiha + AAB/APK artifact.
# Actions → "TWA Android build" → Run workflow → build_mode tanlang.
#
# Imzolangan build uchun (Play upload):
#   Repo → Settings → Secrets and variables → Actions → Repository secrets:
#     TWA_ANDROID_KEYSTORE_BASE64  — android.keystore faylining base64 (npm run twa:secret-b64)
#     TWA_KEYSTORE_PASSWORD
#     TWA_KEY_PASSWORD
#   Keystore alias twa-manifest.json dagi bilan bir xil bo‘lishi kerak: android
name: TWA Android build

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'unsigned = test artifact; signed = Play (3 ta repo secret majburiy)'
        type: choice
        options:
          - unsigned
          - signed
        default: unsigned

permissions:
  contents: read

concurrency:
  group: twa-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  twa:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v4
        with:
          packages: >-
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Bubblewrap config (non-interactive)
        run: |
          set -euo pipefail
          test -n "${JAVA_HOME:-}"
          test -n "${ANDROID_SDK_ROOT:-}"
          mkdir -p "$HOME/.bubblewrap"
          jq -n --arg j "$JAVA_HOME" --arg s "$ANDROID_SDK_ROOT" \
            '{jdkPath: $j, androidSdkPath: $s}' > "$HOME/.bubblewrap/config.json"
          cat "$HOME/.bubblewrap/config.json"

      - name: Install npm dependencies
        run: npm ci

      - name: Sync TWA manifest from public/manifest.json
        run: npm run twa:sync-manifest

      - name: Bubblewrap update (Android loyiha)
        working-directory: android-twa
        run: npx bubblewrap update --skipVersionUpgrade

      - name: Verify secrets for signed build
        if: github.event.inputs.build_mode == 'signed'
        env:
          KS: ${{ secrets.TWA_ANDROID_KEYSTORE_BASE64 }}
          KP: ${{ secrets.TWA_KEYSTORE_PASSWORD }}
          KK: ${{ secrets.TWA_KEY_PASSWORD }}
        run: |
          if [ -z "$KS" ] || [ -z "$KP" ] || [ -z "$KK" ]; then
            echo "::error::signed rejim: GitHub repo secretlari yo'q — TWA_ANDROID_KEYSTORE_BASE64, TWA_KEYSTORE_PASSWORD, TWA_KEY_PASSWORD"
            exit 1
          fi

      - name: Decode keystore (signed)
        if: github.event.inputs.build_mode == 'signed'
        working-directory: android-twa
        env:
          KS: ${{ secrets.TWA_ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$KS" | base64 -d > android.keystore
          test -s android.keystore

      - name: Bubblewrap build (imzolangan)
        if: github.event.inputs.build_mode == 'signed'
        working-directory: android-twa
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.TWA_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.TWA_KEY_PASSWORD }}
        run: npx bubblewrap build

      - name: Bubblewrap build (imzosiz)
        if: github.event.inputs.build_mode != 'signed'
        working-directory: android-twa
        run: npx bubblewrap build --skipSigning

      - name: Upload signed artifacts
        if: github.event.inputs.build_mode == 'signed'
        uses: actions/upload-artifact@v4
        with:
          name: rash-twa-signed-${{ github.run_number }}
          if-no-files-found: error
          path: |
            android-twa/app-release-bundle.aab
            android-twa/app-release-signed.apk

      - name: Upload unsigned artifacts
        if: github.event.inputs.build_mode != 'signed'
        uses: actions/upload-artifact@v4
        with:
          name: rash-twa-unsigned-${{ github.run_number }}
          if-no-files-found: error
          path: |
            android-twa/app/build/outputs/bundle/release/*.aab
            android-twa/app/build/outputs/apk/release/*.apk
            android-twa/app-release-unsigned-aligned.apk
